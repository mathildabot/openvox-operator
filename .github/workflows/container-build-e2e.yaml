name: Container Build (E2E)

on:
  workflow_call:
    inputs:
      image_name:
        description: 'Image name (without registry prefix)'
        required: true
        type: string
      dockerfile:
        description: 'Path to Containerfile'
        required: true
        type: string
      context:
        description: 'Build context path'
        required: false
        type: string
        default: '.'
    outputs:
      version:
        description: 'Image version tag'
        value: ${{ jobs.build.outputs.version }}

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.tag }}
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Determine version
        id: version
        run: echo "tag=$(git describe --always)" >> $GITHUB_OUTPUT

      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - uses: docker/build-push-action@v7
        with:
          context: ${{ inputs.context }}
          file: ${{ inputs.dockerfile }}
          platforms: linux/amd64
          push: true
          provenance: false
          tags: |
            ghcr.io/${{ github.repository_owner }}/${{ inputs.image_name }}:${{ steps.version.outputs.tag }}
            ghcr.io/${{ github.repository_owner }}/${{ inputs.image_name }}:latest
          cache-from: type=gha,scope=e2e-${{ inputs.image_name }}
          cache-to: type=gha,mode=max,scope=e2e-${{ inputs.image_name }}
