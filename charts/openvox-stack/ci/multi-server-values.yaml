servers:
  - name: ca
    ca: true
    server: true
    certificate:
      certname: puppet
    replicas: 1
    resources:
      requests:
        cpu: 250m
        memory: 512Mi
      limits:
        memory: 1Gi
  - name: server
    ca: false
    server: true
    certificate:
      certname: server
    replicas: 2
    resources:
      requests:
        cpu: 250m
        memory: 512Mi
      limits:
        memory: 1Gi

pools:
  - name: ca
    serverRef: ca
    service:
      type: ClusterIP
      port: 8140
  - name: server
    serverRef: server
    service:
      type: ClusterIP
      port: 8140
