# nameOverride: ""
# fullnameOverride: ""

environment:
  name: ""             # default: Release name
  image:
    repository: ghcr.io/slauger/openvox-server
    tag: latest
    pullPolicy: Always
  puppetdb:
    serverUrls: []
  puppet:
    environmentTimeout: unlimited
    storeconfigs: false
    reports: store

ca:
  name: ""             # default: {fullname}-ca
  ttl: 5y
  storage:
    size: 1Gi
    storageClass: ""

signingPolicy:
  enabled: true
  name: ""             # default: {fullname}-autosign
  any: true

servers:
  - name: puppet
    ca: true
    server: true
    certificate:
      certname: puppet
      dnsAltNames: []
    replicas: 1
    resources:
      requests:
        cpu: 500m
        memory: 1Gi
      limits:
        memory: 2Gi
    pool:
      name: ""         # default: {fullname}-{name}
      service:
        type: ClusterIP
        port: 8140
