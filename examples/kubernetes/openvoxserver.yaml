apiVersion: v1
kind: Service
metadata:
  name: puppet
  labels:
    app.kubernetes.io/name: openvoxserver
spec:
  type: ClusterIP
  ports:
    - port: 8140
      targetPort: 8140
      protocol: TCP
      name: https
  selector:
    app.kubernetes.io/name: openvoxserver
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: openvoxserver
  labels:
    app.kubernetes.io/name: openvoxserver
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: openvoxserver
  template:
    metadata:
      labels:
        app.kubernetes.io/name: openvoxserver
    spec:
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: openvoxserver
          image: openvoxserver:latest
          ports:
            - containerPort: 8140
              protocol: TCP
          env:
            - name: USE_OPENVOXDB
              value: "false"
            - name: AUTOSIGN
              value: "true"
            - name: OPENVOXSERVER_JAVA_ARGS
              value: "-Xms1024m -Xmx1024m"
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: false
          startupProbe:
            exec:
              command: ["/healthcheck.sh"]
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 15
            failureThreshold: 18
          livenessProbe:
            exec:
              command: ["/healthcheck.sh"]
            periodSeconds: 20
            timeoutSeconds: 15
            failureThreshold: 3
          readinessProbe:
            exec:
              command: ["/healthcheck.sh"]
            periodSeconds: 10
            timeoutSeconds: 10
            failureThreshold: 3
          resources:
            requests:
              memory: "1Gi"
              cpu: "500m"
            limits:
              memory: "2Gi"
          volumeMounts:
            - name: puppet-code
              mountPath: /etc/puppetlabs/code
            - name: puppet-ssl
              mountPath: /etc/puppetlabs/puppet/ssl
            - name: puppet-data
              mountPath: /opt/puppetlabs/server/data/puppetserver
      volumes:
        - name: puppet-code
          emptyDir: {}
        - name: puppet-ssl
          emptyDir: {}
        - name: puppet-data
          emptyDir: {}
